<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f1e9dc" />
    <title>StreakBonsai</title>
    <link rel="icon" type="image/svg+xml" href="./bonsai-favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .auth-overlay {
        position: fixed !important;
        inset: 0 !important;
        z-index: 9999 !important;
        display: flex !important;
        align-items: center;
        justify-content: center;
        background: var(--bg, #f2e9d8);
        padding: 24px;
      }
      .auth-overlay[hidden] { display: none !important; }
      .auth-card {
        background: var(--surface, rgba(255,253,246,0.96));
        border-radius: 26px;
        box-shadow: 0 18px 44px rgba(110,85,50,0.13);
        padding: 32px 28px;
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; }
      .auth-logo__name { font-size: 1.2rem; font-weight: 700; color: var(--ink, #2c2820); letter-spacing: .03em; }
      .auth-tabs { display: flex; gap: 4px; background: rgba(0,0,0,.06); border-radius: 12px; padding: 4px; }
      .auth-tab { flex: 1; background: none; border: none; border-radius: 9px; padding: 8px 0; font-size: .88rem; color: var(--muted, #7e7265); cursor: pointer; transition: background .15s, color .15s; }
      .auth-tab.is-active { background: var(--surface, #fff); color: var(--ink, #2c2820); font-weight: 600; box-shadow: 0 2px 8px rgba(110,85,50,.1); }
      .auth-form { display: flex; flex-direction: column; gap: 14px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field__label { font-size: .82rem; color: var(--muted, #7e7265); font-weight: 500; }
      .field__input { background: rgba(0,0,0,.04); border: 1.5px solid rgba(0,0,0,.1); border-radius: 10px; padding: 10px 12px; font-size: .95rem; color: var(--ink, #2c2820); outline: none; font-family: inherit; }
      .field__input:focus { border-color: var(--accent, #c75e33); }
      .auth-error { font-size: .83rem; color: var(--danger, #b04040); text-align: center; margin: 0; line-height: 1.4; }
      .auth-hint { font-size: .82rem; color: var(--muted, #7e7265); text-align: center; margin: 0; }
      .auth-switch { background: none; border: none; color: var(--accent, #c75e33); cursor: pointer; font-size: inherit; padding: 0; text-decoration: underline; font-family: inherit; }
      .auth-loading { display:flex; align-items:center; justify-content:center; margin:10px 0; }
      .auth-spinner { width:26px; height:26px; border:2.5px solid rgba(126,114,101,0.2); border-top-color:var(--muted,#7e7265); border-radius:50%; animation:spin .75s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
      .auth-submit { width: 100%; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="ambient ambient--left" aria-hidden="true"></div>
      <div class="ambient ambient--right" aria-hidden="true"></div>

      <div class="device-frame">
        <header class="topbar">
          <div class="topbar__brand">
            <span class="brand-chip">StreakBonsai</span>
            <p class="topbar__date" id="today-label"></p>
          </div>
          <button
            type="button"
            class="ghost-button"
            id="setup-shortcut"
            data-action="open-setup"
          >
            챔짢짯책짰혳
          </button>
        </header>

        <main class="screen-frame" id="screen-root" aria-live="polite"></main>

        <nav class="tabbar" id="bottom-nav" aria-label="채쨍쨩챔짝혖챌혬쨩챕혶짖">
          <button type="button" class="tabbar__item" data-action="navigate" data-view="today">
            <svg class="tabbar__icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <circle cx="12" cy="12" r="4.5"/>
              <rect x="11" y="1" width="2" height="3" rx="1"/>
              <rect x="11" y="20" width="2" height="3" rx="1"/>
              <rect x="1" y="11" width="3" height="2" rx="1"/>
              <rect x="20" y="11" width="3" height="2" rx="1"/>
              <rect x="4.22" y="4.93" width="2" height="3" rx="1" transform="rotate(-45 4.22 4.93)"/>
              <rect x="17.66" y="4.93" width="2" height="3" rx="1" transform="rotate(45 17.66 4.93)"/>
              <rect x="4.22" y="18.36" width="2" height="3" rx="1" transform="rotate(45 4.22 18.36)"/>
              <rect x="17.66" y="18.36" width="2" height="3" rx="1" transform="rotate(-45 17.66 18.36)"/>
            </svg>
            <span>Today</span>
          </button>
          <button type="button" class="tabbar__item" data-action="navigate" data-view="roadmap">
            <svg class="tabbar__icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <path d="M3 5.5L9 3l6 3 6-2.5V18l-6 2.5-6-3-6 2.5V5.5z" opacity="0.3"/>
              <rect x="8" y="3" width="2" height="17" rx="1"/>
              <rect x="14" y="5" width="2" height="15" rx="1"/>
            </svg>
            <span>Roadmap</span>
          </button>
          <button type="button" class="tabbar__item" data-action="navigate" data-view="review">
            <svg class="tabbar__icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <rect x="3" y="13" width="4" height="8" rx="1"/>
              <rect x="10" y="7" width="4" height="14" rx="1"/>
              <rect x="17" y="3" width="4" height="18" rx="1"/>
            </svg>
            <span>Review</span>
          </button>
          <button type="button" class="tabbar__item" data-action="navigate" data-view="garden">
            <svg class="tabbar__icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
              <ellipse cx="12" cy="8" rx="5" ry="6" opacity="0.4"/>
              <ellipse cx="7" cy="13" rx="4" ry="3" transform="rotate(-30 7 13)" opacity="0.7"/>
              <ellipse cx="17" cy="13" rx="4" ry="3" transform="rotate(30 17 13)" opacity="0.7"/>
              <rect x="11" y="12" width="2" height="10" rx="1"/>
            </svg>
            <span>Garden</span>
          </button>
        </nav>
      </div>
    </div>

    <div class="sheet" id="session-sheet" hidden></div>
    <div class="toast" id="toast" hidden></div>

    <div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 40 40" width="48" height="48" aria-hidden="true">
        <circle cx="20" cy="28" r="8" fill="#e8c87a" opacity="0.9"/>
        <rect x="19" y="10" width="2" height="18" rx="1" fill="#7a9e6e"/>
        <ellipse cx="20" cy="10" rx="6" ry="7" fill="#f6d365" opacity="0.85"/>
        <ellipse cx="13" cy="16" rx="5" ry="3.5" transform="rotate(-30 13 16)" fill="#f6d365" opacity="0.7"/>
        <ellipse cx="27" cy="16" rx="5" ry="3.5" transform="rotate(30 27 16)" fill="#f6d365" opacity="0.7"/>
      </svg>
      <span class="auth-logo__name">StreakBonsai</span>
    </div>

    <div class="auth-tabs" id="auth-tabs">
      <button type="button" class="auth-tab is-active" data-auth-tab="login">찾혘짯찾혗째찾혗짚찾혘쨀</button>
      <button type="button" class="auth-tab" data-auth-tab="signup">챈혯째챔짝혧챌혲쨩챕혣짼</button>
    </div>

    <form class="auth-form" id="auth-form" autocomplete="on">
      <div class="field">
        <label class="field__label" for="auth-email">찾혘징찾혘쩌찾혘짬찾혗짖찾혘혟찾혘짭찾혗쨔</label>
        <input class="field__input" type="email" id="auth-email" name="email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label class="field__label" for="auth-password">찾혘혩찾혗쨔찾혘짱찾혘쩌찾혘혟</label>
        <input class="field__input" type="password" id="auth-password" name="password" required autocomplete="current-password" placeholder="8챈혯혝책짯혰채쨩짜채쨍혡" minlength="8" />
      </div>
      <p class="auth-error" id="auth-error" hidden></p>
      <button type="submit" class="action-button action-button--primary auth-submit" id="auth-submit">찾혘짯찾혗째찾혗짚찾혘쨀</button>
    </form>

    <p class="auth-hint" id="auth-hint">
      찾혗짖찾혗짬찾혗짝찾혘쨀찾혘혞찾혗혪찾혖혡챈혣혖찾혖징찾혖짠찾혖짧찾혖혙찾혖짠찾혖혲찾혖혢챦쩌혺
      <button type="button" class="auth-switch" id="auth-switch-btn">챈혯째챔짝혧챌혲쨩챕혣짼찾혖짱찾혖혫찾혖징찾혗혟</button>
    </p>

    <div class="auth-loading" id="auth-loading" hidden><div class="auth-spinner"></div></div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js?v=20260328"></script>
  </body>
</html>
